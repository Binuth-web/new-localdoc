<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MedConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><i class="fa-solid fa-heart-pulse"></i> MedConnect</a>
    </nav>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Please log in to your account</p>
            </div>
            
            <div class="login-tabs">
                <button class="tab-btn active" data-role="patient" onclick="switchTab('patient')">Patient</button>
                <button class="tab-btn" data-role="medical_staff" onclick="switchTab('medical_staff')">Medical Staff</button>
                <button class="tab-btn" data-role="admin" onclick="switchTab('admin')">Admin</button>
            </div>

            <!-- Login Form for Staff and Admin -->
            <form class="login-form" id="staffLoginForm" style="display: none;" onsubmit="handleLogin(event)">
                <input type="hidden" id="staff_role" name="role" value="medical_staff">
                <div id="staff-alert-box" class="alert"></div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn-primary" id="staff-submit-btn" style="width: 100%; margin-top: 0.5rem;">
                    Log in
                </button>
            </form>

            <!-- Login Form for Patient -->
            <form class="login-form" id="patientLoginForm" onsubmit="handlePatientLogin(event)">
                <input type="hidden" name="role" value="patient">
                <div id="patient-alert-box" class="alert"></div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" class="form-control" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" name="phone" class="form-control" required placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control" required min="0" max="150" placeholder="Enter your age">
                </div>

                <button type="submit" class="btn-primary" id="patient-submit-btn" style="width: 100%; margin-top: 0.5rem;">
                    Log in as Patient
                </button>

                <div class="login-footer" id="register-link">
                    Don't have an account? <a href="#" onclick="toggleRegister(true); return false;">Register here</a>
                </div>
            </form>

            <!-- Registration Form for Patient -->
            <form class="login-form" id="registerForm" style="display: none;" onsubmit="handlePatientRegister(event)">
                <div id="reg-alert-box" class="alert"></div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" class="form-control" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" name="phone" class="form-control" required placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control" required min="0" max="150" placeholder="Enter your age">
                </div>

                <button type="submit" class="btn-primary" id="reg-submit-btn" style="width: 100%; margin-top: 0.5rem;">
                    Create Account
                </button>

                <div class="login-footer">
                    Already have an account? <a href="#" onclick="toggleRegister(false); return false;">Log in here</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
