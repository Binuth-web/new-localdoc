<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login | MedConnect</title>
    <meta name="description" content="Log in to your MedConnect patient account to view and manage your appointments.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><i class="fa-solid fa-heart-pulse"></i> MedConnect</a>
    </nav>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h2><i class="fa-solid fa-user" style="color: var(--primary);"></i> Patient Portal</h2>
                <p>Log in to view and manage your appointments</p>
            </div>

            <!-- Patient Login Form -->
            <form class="login-form" id="patientLoginForm" onsubmit="handlePatientLogin(event)">
                <input type="hidden" name="role" value="patient">
                <div id="patient-alert-box" class="alert"></div>

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" class="form-control" required placeholder="Enter your first name">
                </div>
                <div class="form-group">
                    <label>NIC Number</label>
                    <input type="text" name="id_number" class="form-control" required placeholder="Enter your NIC number">
                </div>

                <button type="submit" class="btn-primary" id="patient-submit-btn" style="width: 100%; margin-top: 0.5rem;">
                    <i class="fa-solid fa-right-to-bracket"></i> Log In
                </button>

                <div class="login-footer" id="register-link">
                    Don't have an account? <a href="#" onclick="toggleRegister(true); return false;">Register here</a>
                </div>
            </form>

            <!-- Patient Registration Form -->
            <form class="login-form" id="registerForm" style="display: none;" onsubmit="handlePatientRegister(event)">
                <div id="reg-alert-box" class="alert"></div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" class="form-control" required placeholder="First Name">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" class="form-control" required placeholder="Last Name">
                    </div>
                </div>
                <div class="form-group">
                    <label>NIC Number</label>
                    <input type="text" name="id_number" class="form-control" required placeholder="Enter your NIC number">
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="tel" name="phone" class="form-control" required placeholder="Phone number">
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="reg-submit-btn" style="width: 100%; margin-top: 0.5rem;">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>

                <div class="login-footer">
                    Already have an account? <a href="#" onclick="toggleRegister(false); return false;">Log in here</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if (redirect) {
                const note = document.createElement('p');
                note.style.cssText = 'text-align:center;color:var(--text-muted);font-size:0.9rem;margin:0 2rem 1rem;';
                note.textContent = 'Please log in to continue.';
                const box = document.querySelector('.login-box');
                if (box) box.insertBefore(note, box.querySelector('.login-form'));
            }
        });

        function toggleRegister(show) {
            document.getElementById('patientLoginForm').style.display = show ? 'none' : 'flex';
            document.getElementById('registerForm').style.display = show ? 'flex' : 'none';
            document.querySelectorAll('.alert').forEach(a => a.style.display = 'none');
        }

        function handlePatientLogin(event) {
            event.preventDefault();
            const form = document.getElementById('patientLoginForm');
            const formData = new FormData(form);
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if (redirect) formData.append('redirect', redirect);
            const center = urlParams.get('center');
            if (center) formData.append('center', center);
            formData.append('portal', 'patient');

            const alertBox = document.getElementById('patient-alert-box');
            const submitBtn = document.getElementById('patient-submit-btn');
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
            submitBtn.disabled = true;

            fetch('api/login.php', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alertBox.className = 'alert success';
                    alertBox.innerText = 'Login successful! Redirecting...';
                    alertBox.style.display = 'block';
                    setTimeout(() => { window.location.href = data.redirect; }, 900);
                } else {
                    alertBox.className = 'alert error';
                    alertBox.innerText = data.message || 'Login failed.';
                    alertBox.style.display = 'block';
                    submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Log In';
                    submitBtn.disabled = false;
                }
            })
            .catch(() => {
                alertBox.className = 'alert error';
                alertBox.innerText = 'A network error occurred.';
                alertBox.style.display = 'block';
                submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Log In';
                submitBtn.disabled = false;
            });
        }

        function handlePatientRegister(event) {
            event.preventDefault();
            const form = document.getElementById('registerForm');
            const formData = new FormData(form);
            const urlParams = new URLSearchParams(window.location.search);
            const centerId = urlParams.get('center_id');
            if (centerId) formData.append('center_id', centerId);
            const alertBox = document.getElementById('reg-alert-box');
            const submitBtn = document.getElementById('reg-submit-btn');
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registering...';
            submitBtn.disabled = true;

            fetch('api/register.php', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alertBox.className = 'alert success';
                    alertBox.innerText = data.message;
                    alertBox.style.display = 'block';
                    form.reset();
                    setTimeout(() => { window.location.href = data.redirect || 'dashboard_patient.php'; }, 1500);
                } else {
                    alertBox.className = 'alert error';
                    alertText = data.message || 'Registration failed.';
                    alertBox.innerText = alertText;
                    alertBox.style.display = 'block';
                    submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
                    submitBtn.disabled = false;
                }
            })
            .catch(() => {
                alertBox.className = 'alert error';
                alertBox.innerText = 'A network error occurred.';
                alertBox.style.display = 'block';
                submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
                submitBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
