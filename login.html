<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login | MedConnect</title>
    <meta name="description" content="Log in to your MedConnect patient account to view and manage your appointments.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><i class="fa-solid fa-heart-pulse"></i> MedConnect</a>
    </nav>

    <style>
        body {
            background-color: #f1f5f9;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .navbar-brand { color: white !important; }
        .split-login-wrapper {
            max-width: 1100px;
            margin: 4rem auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            padding: 0 2rem;
            position: relative;
            z-index: 10;
        }
        .split-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .split-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0.8;
        }
        .split-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.95);
        }
        .split-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .split-header h2 {
            margin: 0 0 0.5rem;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .split-header p {
            margin: 0;
            color: #64748b;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .form-control:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            padding: 0.85rem;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.5);
        }
        @media (max-width: 768px) {
            .split-login-wrapper {
                grid-template-columns: 1fr;
                margin: 2rem auto;
                padding: 0 1rem;
            }
            .split-card { padding: 2rem; }
        }
    </style>

    <div class="split-login-wrapper">
        <!-- Left Side: Login Form -->
        <div class="split-card">
            <div class="split-header">
                <h2><i class="fa-solid fa-right-to-bracket" style="color: var(--primary);"></i> Login</h2>
                <p>Already have an account? Log in here</p>
            </div>

            <form class="login-form" id="patientLoginForm" onsubmit="handlePatientLogin(event)" style="display: flex;">
                <input type="hidden" name="role" value="patient">
                <div id="patient-alert-box" class="alert"></div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" class="form-control" required placeholder="First Name">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" class="form-control" required placeholder="Last Name">
                    </div>
                </div>
                <div class="form-group">
                    <label>NIC Number</label>
                    <input type="text" name="id_number" class="form-control" required placeholder="Enter your NIC number">
                </div>

                <button type="submit" class="btn-primary" id="patient-submit-btn" style="width: 100%; margin-top: 1rem;">
                    <i class="fa-solid fa-right-to-bracket"></i> Log In
                </button>
            </form>
        </div>

        <!-- Right Side: Registration Form -->
        <div class="split-card">
            <div class="split-header">
                <h2><i class="fa-solid fa-user-plus" style="color: var(--secondary);"></i> Register</h2>
                <p>New to MedConnect? Please register first</p>
            </div>

            <form class="login-form" id="registerForm" onsubmit="handlePatientRegister(event)" style="display: flex;">
                <div id="reg-alert-box" class="alert"></div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" class="form-control" required placeholder="First Name">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" class="form-control" required placeholder="Last Name">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="patient@example.com">
                </div>
                <div class="form-group">
                    <label>NIC Number</label>
                    <input type="text" name="id_number" class="form-control" required placeholder="Enter your NIC number" pattern="^(?:\d{9}[VvXx]|\d{12})$" title="Format: 9 digits followed by V/X, or 12 digits (e.g. 981234567V or 199812345678)">
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="tel" name="phone" class="form-control" required placeholder="07XXXXXXXX" pattern="^0\d{9}$" title="Format: 10 digits starting with 0 (e.g. 0712345678)">
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="reg-submit-btn" style="width: 100%; margin-top: 1rem;">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if (redirect) {
                const note = document.createElement('div');
                note.className = 'alert error';
                note.style.display = 'block';
                note.style.marginBottom = '2rem';
                note.style.textAlign = 'center';
                note.textContent = 'Please log in or register to continue.';
                const wrapper = document.querySelector('.split-login-wrapper');
                if (wrapper) wrapper.parentElement.insertBefore(note, wrapper);
            }
        });

        function handlePatientLogin(event) {
            event.preventDefault();
            const form = document.getElementById('patientLoginForm');
            const formData = new FormData(form);
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if (redirect) formData.append('redirect', redirect);
            const center = urlParams.get('center');
            if (center) formData.append('center', center);
            formData.append('portal', 'patient');

            const alertBox = document.getElementById('patient-alert-box');
            const submitBtn = document.getElementById('patient-submit-btn');
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
            submitBtn.disabled = true;

            fetch('api/login.php', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alertBox.className = 'alert success';
                    alertBox.innerText = 'Login successful! Redirecting...';
                    alertBox.style.display = 'block';
                    setTimeout(() => { window.location.href = data.redirect; }, 900);
                } else {
                    alertBox.className = 'alert error';
                    alertBox.innerText = data.message || 'Login failed.';
                    alertBox.style.display = 'block';
                    submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Log In';
                    submitBtn.disabled = false;
                }
            })
            .catch(() => {
                alertBox.className = 'alert error';
                alertBox.innerText = 'A network error occurred.';
                alertBox.style.display = 'block';
                submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Log In';
                submitBtn.disabled = false;
            });
        }

        function handlePatientRegister(event) {
            event.preventDefault();
            const form = document.getElementById('registerForm');
            const formData = new FormData(form);
            const urlParams = new URLSearchParams(window.location.search);
            const centerId = urlParams.get('center_id');
            if (centerId) formData.append('center_id', centerId);
            const alertBox = document.getElementById('reg-alert-box');
            const submitBtn = document.getElementById('reg-submit-btn');

            // Client-side validation
            const phone = formData.get('phone');
            const nic = formData.get('id_number');
            
            if (!/^0\d{9}$/.test(phone)) {
                alertBox.className = 'alert error';
                alertBox.innerText = 'Invalid contact number. Must be 10 digits starting with 0.';
                alertBox.style.display = 'block';
                return;
            }
            if (!/^(?:\d{9}[VvXx]|\d{12})$/.test(nic)) {
                alertBox.className = 'alert error';
                alertBox.innerText = 'Invalid NIC format. Must be 9 digits followed by V/X or 12 digits.';
                alertBox.style.display = 'block';
                return;
            }

            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registering...';
            submitBtn.disabled = true;

            fetch('api/register.php', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alertBox.className = 'alert success';
                    alertBox.innerText = data.message;
                    alertBox.style.display = 'block';
                    form.reset();
                    setTimeout(() => { window.location.href = data.redirect || 'dashboard_patient.php'; }, 1500);
                } else {
                    alertBox.className = 'alert error';
                    alertText = data.message || 'Registration failed.';
                    alertBox.innerText = alertText;
                    alertBox.style.display = 'block';
                    submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
                    submitBtn.disabled = false;
                }
            })
            .catch(() => {
                alertBox.className = 'alert error';
                alertBox.innerText = 'A network error occurred.';
                alertBox.style.display = 'block';
                submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
                submitBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
